name: hbomax_clone
description: HBO Max Landing Page Clone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^13.2.0

  # Estado
  flutter_riverpod: ^2.5.1

  # Imágenes
  cached_network_image: ^3.3.1

  # SVG
  flutter_svg: ^2.0.10+1

  # Fuentes
  google_fonts: ^6.2.1

  # FAQ accordion
  expandable: ^5.0.1

  # Links externos
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
